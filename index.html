<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生預約系統 - 預約您的會議</title>
    <meta name="description" content="預約您的 30 或 60 分鐘會議，隨時查看我的行程並排程。">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.5.25/jsrsasign-all-min.js"></script>
    <script async defer src="https://apis.google.com/js/api.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo-area">
                <i data-lucide="calendar" class="logo-icon"></i>
                <h1>預約會議</h1>
            </div>
            <p class="subtitle">選擇一個適合您的時間，讓我們開始討論！</p>
            <div class="line-notice">
                <i data-lucide="message-circle"></i>
                <span>其餘時間請用 LINE 聯絡：<strong>leonyifengwu</strong></span>
            </div>
        </header>

        <main class="booking-layout">
            <!-- Step 1: Duration & Date -->
            <section class="selection-panel">
                <div class="card duration-card">
                    <h3><i data-lucide="clock"></i> 選擇會議時長</h3>
                    <div class="duration-options">
                        <button class="duration-btn active" data-duration="30">
                            <span class="btn-label">30 分鐘</span>
                            <span class="btn-desc">快速討論、進度報告</span>
                        </button>
                        <button class="duration-btn" data-duration="60">
                            <span class="btn-label">60 分鐘</span>
                            <span class="btn-desc">深入諮詢、專題研發</span>
                        </button>
                    </div>
                </div>

                <div class="card calendar-card">
                    <div class="calendar-header">
                        <button id="prevMonth"><i data-lucide="chevron-left"></i></button>
                        <h2 id="currentMonthYear">2026年 3月</h2>
                        <button id="nextMonth"><i data-lucide="chevron-right"></i></button>
                    </div>
                    <div class="calendar-grid-header">
                        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                    </div>
                    <div id="calendarGrid" class="calendar-grid">
                        <!-- Days will be generated by JS -->
                    </div>
                </div>
            </section>

            <!-- Step 2: Time Slots -->
            <section class="slots-panel">
                <div class="card slots-card">
                    <div class="slots-header">
                        <h3 id="selectedDateTitle">點擊日期查看空檔</h3>
                        <p id="timezoneText">時區：台北 (GMT+8)</p>
                    </div>
                    <div id="slotsGrid" class="slots-grid">
                        <div class="empty-slots-msg">請先選擇左側的日期</div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Booking Modal -->
        <div id="bookingModal" class="modal">
            <div class="modal-content card">
                <button class="close-modal"><i data-lucide="x"></i></button>
                <h2>確認預約</h2>
                <div class="booking-summary">
                    <p><i data-lucide="calendar-check"></i> <span id="summaryDate">2026年3月31日</span></p>
                    <p><i data-lucide="clock"></i> <span id="summaryTime">14:00 - 14:30</span> (<span id="summaryDuration">30</span>分鐘)</p>
                </div>
                <form id="bookingForm">
                    <div class="form-group">
                        <label for="studentName">您的姓名</label>
                        <input type="text" id="studentName" placeholder="例如：王小明" required>
                    </div>
                    <div class="form-group">
                        <label for="studentEmail">電子信箱</label>
                        <input type="email" id="studentEmail" placeholder="example@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="meetingSubject">會議主題</label>
                        <textarea id="meetingSubject" placeholder="請簡述您想討論的內容..." rows="3"></textarea>
                    </div>
                    <button type="submit" class="submit-btn">送出預約 <i data-lucide="send"></i></button>
                </form>
            </div>
        </div>

        <!-- Success Message -->
        <div id="successOverlay" class="overlay">
            <div class="success-card card">
                <div class="success-icon-wrapper">
                    <i data-lucide="check-circle" class="success-icon"></i>
                </div>
                <h2>預約成功！</h2>
                <p>確認信件已寄送到您的信箱。</p>
                <button id="closeSuccess" class="secondary-btn">關閉窗格</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
